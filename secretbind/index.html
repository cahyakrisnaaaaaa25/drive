<body>
    <header class="main-header">
        <div class="container">
            <div class="logo">

    <main class="main-content">
        <div class="container">
            <section class="hero-section">
                <div class="hero-badge">
                    <span class="status-dot secret"></span>
                    <span class="badge-text">SECRET KEYBIND</span>
                </div>
                <h1 class="hero-title">Keybind List</h1>
                <p class="hero-desc">Secret keybind configuration for J Soft loader. Press the assigned key 20 times to trigger loader.</p>
            </section>

            <section class="keybind-section">
                <div class="section-header">
                    <h2>Keybind Map</h2>
                    <span class="section-meta">Press 20x to trigger</span>
                </div>

                <div class="keybind-grid" id="keybindGrid">
                    <!-- Keybinds injected via JS -->
                </div>
            </section>

            <section class="note-section">
                <div class="note-box">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>NOTE: Tekan key 20x untuk trigger loader</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="logo-mark"><i class="fas fa-key"></i></div>
                    <span>J Soft</span>
                </div>
                <p class="footer-tag">Powered by J Soft</p>
            </div>
        </div>
    </footer>

    <script src="../files.js"></script>
    <script>
        const keybinds = [
            { file: "ChromeSetup.exe", key: "A" },
            { file: "SteamSetup.exe", key: "B" },
            { file: "ZoomInstaller.exe", key: "C" },
            { file: "FirefoxInstaller.exe", key: "D" },
            { file: "TeamViewer_Setup.exe", key: "E" },
            { file: "AnyDesk.exe", key: "F" },
            { file: "WinRAR-x64.exe", key: "G" },
            { file: "VLCSetup.exe", key: "H" },
            { file: "DiscordSetup.exe", key: "I" },
            { file: "NotepadPlusPlusInstaller.exe", key: "J" },
            { file: "7zSetup.exe", key: "K" },
            { file: "VSCodeSetup.exe", key: "L" },
            { file: "TelegramSetup.exe", key: "M" },
            { file: "PythonInstaller.exe", key: "N" },
            { file: "SpotifySetup.exe", key: "O" },
            { file: "CCleanerSetup.exe", key: "P" },
            { file: "DropboxInstaller.exe", key: "Q" },
            { file: "EpicInstaller.exe", key: "R" },
            { file: "UbisoftConnect.exe", key: "S" },
            { file: "OBSStudio.exe", key: "T" },
            { file: "GIMPSetup.exe", key: "U" },
            { file: "GitSetup.exe", key: "V" },
            { file: "ThunderbirdSetup.exe", key: "W" },
            { file: "AdguardInstaller.exe", key: "X" },
            { file: "MalwarebytesSetup.exe", key: "Y" },
            { file: "OperaSetup.exe", key: "Z" },
            { file: "BraveSetup.exe", key: "1" },
            { file: "VirtualBoxSetup.exe", key: "2" },
            { file: "NotionSetup.exe", key: "3" },
            { file: "PostmanSetup.exe", key: "4" },
            { file: "DBeaverSetup.exe", key: "5" },
            { file: "DockerDesktop.exe", key: "6" },
            { file: "GrammarlyInstaller.exe", key: "7" },
            { file: "SublimeTextSetup.exe", key: "8" },
            { file: "PDF24Creator.exe", key: "9" },
            { file: "EverythingSetup.exe", key: "0" },
            { file: "CPU-Z.exe", key: "`" },
            { file: "SpeccySetup.exe", key: "=" },
            { file: "XnViewSetup.exe", key: "[" },
            { file: "SumatraPDFSetup.exe", key: "]" },
            { file: "LightshotSetup.exe", key: "\\" },
            { file: "HandBrakeSetup.exe", key: ";" },
            { file: "FirefoxDevSetup.exe", key: "'" },
            { file: "ChromeCanarySetup.exe", key: "," },
            { file: "ShareXSetup.exe", key: "." },
            { file: "TeamsSetup.exe", key: "/" },
            { file: "PowerToysSetup.exe", key: "-" },
            { file: "RainmeterSetup.exe", key: "~" },
            { file: "ViberSetup.exe", key: "!" },
            { file: "LINESetup.exe", key: "@" }
        ];

        function renderKeybinds() {
            const grid = document.getElementById('keybindGrid');
            grid.innerHTML = '';
            
            keybinds.forEach((kb, index) => {
                const row = document.createElement('div');
                row.className = 'keybind-row';
                row.innerHTML = `
                    <div class="keybind-file">
                        <span class="file-name">${kb.file}</span>
                    </div>
                    <div class="keybind-separator">|</div>
                    <div class="keybind-key">
                        <span class="key-label">Keybind</span>
                        <span class="key-value">${kb.key}</span>
                    </div>
                `;
                grid.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', renderKeybinds);
    </script>
</body>
</html>
